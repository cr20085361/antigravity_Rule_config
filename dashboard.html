el\u003e` (deletions) tags\n\n## Creating a new Word document\n\nWhen creating a new Word document from scratch, use **docx-js**, which allows you to create Word documents using JavaScript/TypeScript.\n\n### Workflow\n1. **MANDATORY - READ ENTIRE FILE**: Read [`docx-js.md`](docx-js.md) (~500 lines) completely from start to finish. **NEVER set any range limits when reading this file.** Read the full file content for detailed syntax, critical formatting rules, and best practices before proceeding with document creation.\n2. Create a JavaScript/TypeScript file using Document, Paragraph, TextRun components (You can assume all dependencies are installed, but if not, refer to the dependencies section below)\n3. Export as .docx using Packer.toBuffer()\n\n## Editing an existing Word document\n\nWhen editing an existing Word document, use the **Document library** (a Python library for OOXML manipulation). The library automatically handles infrastructure setup and provides methods for document manipulation. For complex scenarios, you can access the underlying DOM directly through the library.\n\n### Workflow\n1. **MANDATORY - READ ENTIRE FILE**: Read [`ooxml.md`](ooxml.md) (~600 lines) completely from start to finish. **NEVER set any range limits when reading this file.** Read the full file content for the Document library API and XML patterns for directly editing document files.\n2. Unpack the document: `python ooxml/scripts/unpack.py \u003coffice_file\u003e \u003coutput_directory\u003e`\n3. Create and run a Python script using the Document library (see \"Document Library\" section in ooxml.md)\n4. Pack the final document: `python ooxml/scripts/pack.py \u003cinput_directory\u003e \u003coffice_file\u003e`\n\nThe Document library provides both high-level methods for common operations and direct DOM access for complex scenarios.\n\n## Redlining workflow for document review\n\nThis workflow allows you to plan comprehensive tracked changes using markdown before implementing them in OOXML. **CRITICAL**: For complete tracked changes, you must implement ALL changes systematically.\n\n**Batching Strategy**: Group related changes into batches of 3-10 changes. This makes debugging manageable while maintaining efficiency. Test each batch before moving to the next.\n\n**Principle: Minimal, Precise Edits**\nWhen implementing tracked changes, only mark text that actually changes. Repeating unchanged text makes edits harder to review and appears unprofessional. Break replacements into: [unchanged text] + [deletion] + [insertion] + [unchanged text]. Preserve the original run's RSID for unchanged text by extracting the `\u003cw:r\u003e` element from the original and reusing it.\n\nExample - Changing \"30 days\" to \"60 days\" in a sentence:\n```python\n# BAD - Replaces entire sentence\n'\u003cw:del\u003e\u003cw:r\u003e\u003cw:delText\u003eThe term is 30 days.\u003c/w:delText\u003e\u003c/w:r\u003e\u003c/w:del\u003e\u003cw:ins\u003e\u003cw:r\u003e\u003cw:t\u003eThe term is 60 days.\u003c/w:t\u003e\u003c/w:r\u003e\u003c/w:ins\u003e'\n\n# GOOD - Only marks what changed, preserves original \u003cw:r\u003e for unchanged text\n'\u003cw:r w:rsidR=\"00AB12CD\"\u003e\u003cw:t\u003eThe term is \u003c/w:t\u003e\u003c/w:r\u003e\u003cw:del\u003e\u003cw:r\u003e\u003cw:delText\u003e30\u003c/w:delText\u003e\u003c/w:r\u003e\u003c/w:del\u003e\u003cw:ins\u003e\u003cw:r\u003e\u003cw:t\u003e60\u003c/w:t\u003e\u003c/w:r\u003e\u003c/w:ins\u003e\u003cw:r w:rsidR=\"00AB12CD\"\u003e\u003cw:t\u003e days.\u003c/w:t\u003e\u003c/w:r\u003e'\n```\n\n### Tracked changes workflow\n\n1. **Get markdown representation**: Convert document to markdown with tracked changes preserved:\n   ```bash\n   pandoc --track-changes=all path-to-file.docx -o current.md\n   ```\n\n2. **Identify and group changes**: Review the document and identify ALL changes needed, organizing them into logical batches:\n\n   **Location methods** (for finding changes in XML):\n   - Section/heading numbers (e.g., \"Section 3.2\", \"Article IV\")\n   - Paragraph identifiers if numbered\n   - Grep patterns with unique surrounding text\n   - Document structure (e.g., \"first paragraph\", \"signature block\")\n   - **DO NOT use markdown line numbers** - they don't map to XML structure\n\n   **Batch organization** (group 3-10 related changes per batch):\n   - By section: \"Batch 1: Section 2 amendments\", \"Batch 2: Section 5 updates\"\n   - By type: \"Batch 1: Date corrections\", \"Batch 2: Party name changes\"\n   - By complexity: Start with simple text replacements, then tackle complex structural changes\n   - Sequential: \"Batch 1: Pages 1-3\", \"Batch 2: Pages 4-6\"\n\n3. **Read documentation and unpack**:\n   - **MANDATORY - READ ENTIRE FILE**: Read [`ooxml.md`](ooxml.md) (~600 lines) completely from start to finish. **NEVER set any range limits when reading this file.** Pay special attention to the \"Document Library\" and \"Tracked Change Patterns\" sections.\n   - **Unpack the document**: `python ooxml/scripts/unpack.py \u003cfile.docx\u003e \u003cdir\u003e`\n   - **Note the suggested RSID**: The unpack script will suggest an RSID to use for your tracked changes. Copy this RSID for use in step 4b.\n\n4. **Implement changes in batches**: Group changes logically (by section, by type, or by proximity) and implement them together in a single script. This approach:\n   - Makes debugging easier (smaller batch = easier to isolate errors)\n   - Allows incremental progress\n   - Maintains efficiency (batch size of 3-10 changes works well)\n\n   **Suggested batch groupings:**\n   - By document section (e.g., \"Section 3 changes\", \"Definitions\", \"Termination clause\")\n   - By change type (e.g., \"Date changes\", \"Party name updates\", \"Legal term replacements\")\n   - By proximity (e.g., \"Changes on pages 1-3\", \"Changes in first half of document\")\n\n   For each batch of related changes:\n\n   **a. Map text to XML**: Grep for text in `word/document.xml` to verify how text is split across `\u003cw:r\u003e` elements.\n\n   **b. Create and run script**: Use `get_node` to find nodes, implement changes, then `doc.save()`. See **\"Document Library\"** section in ooxml.md for patterns.\n\n   **Note**: Always grep `word/document.xml` immediately before writing a script to get current line numbers and verify text content. Line numbers change after each script run.\n\n5. **Pack the document**: After all batches are complete, convert the unpacked directory back to .docx:\n   ```bash\n   python ooxml/scripts/pack.py unpacked reviewed-document.docx\n   ```\n\n6. **Final verification**: Do a comprehensive check of the complete document:\n   - Convert final document to markdown:\n     ```bash\n     pandoc --track-changes=all reviewed-document.docx -o verification.md\n     ```\n   - Verify ALL changes were applied correctly:\n     ```bash\n     grep \"original phrase\" verification.md  # Should NOT find it\n     grep \"replacement phrase\" verification.md  # Should find it\n     ```\n   - Check that no unintended changes were introduced\n\n\n## Converting Documents to Images\n\nTo visually analyze Word documents, convert them to images using a two-step process:\n\n1. **Convert DOCX to PDF**:\n   ```bash\n   soffice --headless --convert-to pdf document.docx\n   ```\n\n2. **Convert PDF pages to JPEG images**:\n   ```bash\n   pdftoppm -jpeg -r 150 document.pdf page\n   ```\n   This creates files like `page-1.jpg`, `page-2.jpg`, etc.\n\nOptions:\n- `-r 150`: Sets resolution to 150 DPI (adjust for quality/size balance)\n- `-jpeg`: Output JPEG format (use `-png` for PNG if preferred)\n- `-f N`: First page to convert (e.g., `-f 2` starts from page 2)\n- `-l N`: Last page to convert (e.g., `-l 5` stops at page 5)\n- `page`: Prefix for output files\n\nExample for specific range:\n```bash\npdftoppm -jpeg -r 150 -f 2 -l 5 document.pdf page  # Converts only pages 2-5\n```\n\n## Code Style Guidelines\n**IMPORTANT**: When generating code for DOCX operations:\n- Write concise code\n- Avoid verbose variable names and redundant operations\n- Avoid unnecessary print statements\n\n## Dependencies\n\nRequired dependencies (install if not available):\n\n- **pandoc**: `sudo apt-get install pandoc` (for text extraction)\n- **docx**: `npm install -g docx` (for creating new documents)\n- **LibreOffice**: `sudo apt-get install libreoffice` (for PDF conversion)\n- **Poppler**: `sudo apt-get install poppler-utils` (for pdftoppm to convert PDF to images)\n- **defusedxml**: `pip install defusedxml` (for secure XML parsing)", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}, {"name": "github-release-archiver", "title": "github-release-archiver", "description": "约束并自动执行 GitHub 版本存档流程步骤。当用户提到“执行 GitHub 存档步骤”、“进行版本归档”、“发布新版本 Release”、“打 Tag 归档”、“项目打包封存”，或需要自动生成/更新带可视化架构图（如 Mermaid 流程图、思维导图）的项目 README 文档时激活。", "category": "productivity", "tags": [], "status": "active", "score": 10.0, "usage_count": 0, "last_used_date": "N/A", "source_type": "custom", "path": "source/custom/productivity/github-release-archiver", "full_content": "---\nname: github-release-archiver\ndescription: 约束并自动执行 GitHub 版本存档流程步骤。当用户提到“执行 GitHub 存档步骤”、“进行版本归档”、“发布新版本 Release”、“打 Tag 归档”、“项目打包封存”，或需要自动生成/更新带可视化架构图（如 Mermaid 流程图、思维导图）的项目 README 文档时激活。\n---\n\n## 💡 核心定位与原则\n\n本技能旨在帮助用户以高度标准化的步骤对 GitHub 项目进行阶段性归档（Release/Tag）。它通过约束前置检查、自动提取更新日志、语义化版本管理、**强制进行文档可视化渲染**，确保每一个被归档的版本都具备清晰的架构、运行逻辑和迭代线索，实现“一眼看懂项目”。\n\n---\n\n## 🛠️ 兼容性与先决条件\n\n- **运行环境**：必须在有效的 Git 仓库根目录或其子目录中运行。\n- **必要工具**：需可调用本地 `git` 命令行。若要进行远程 GitHub Release 部署，用户需配置好 GitHub 远程推送权限（如 SSH Key 或 Access Token），或使用 `gh` CLI（如有）。\n\n---\n\n## 🏃‍♂️ 执行流程约束（五阶段）\n\n一旦触发此技能，必须严格按照以下五个阶段逐步执行，每一步完成后均需与用户进行简要反馈确认：\n\n### 阶段 1：前置体检（Sanity Check）\n1. **仓库有效性**：运行 `git rev-parse --is-inside-work-tree`。若不是 Git 仓库，礼貌告知用户并终止流程。\n2. **工作区状态**：运行 `git status --porcelain`。\n   - 若有未提交的修改，向用户发出警示，列出这些修改，并询问：“当前工作区不干净，建议提交或暂存后再进行版本归档。是否忽略并强制继续？”\n3. **主分支校验**：运行 `git branch --show-current`。\n   - 检查是否在 `main` 或 `master` 等生产发布分支。如果不是，友情提醒用户，确保用户明确知晓正在非主分支上打 Tag。\n\n### 阶段 2：Git Commit 追溯与 Changelog 生成\n1. **定位上一次版本**：运行 `git describe --tags --abbrev=0` 获取最新的 Git Tag。\n   - 如果不存在任何历史 Tag，则默认追溯至首个 Commit：`git log --oneline --reverse`。\n2. **提取提交日志**：运行 `git log \u003clast_tag\u003e..HEAD --oneline`（若无历史 Tag，则直接获取所有 log），提取出自上个版本以来的所有提交记录。\n3. **编写规范中文 Changelog**：根据提取出的 Commit 信息，进行智能分类整理，输出结构化的中文更新日志：\n   - 🚀 **新特性 (Features)**\n   - 🐛 **问题修复 (Bug Fixes)**\n   - ⚡ **性能与优化 (Performance \u0026 Refactoring)**\n   - 📝 **文档变更 (Documentation)**\n   - 展示给用户看，并支持用户进行微调。\n\n### 阶段 3：语义化版本计算与 Tag 生成\n1. **建议新版本号**：基于 Changelog 的改动幅度和当前的语义化版本（Semantic Versioning）规则，向用户推荐下一个版本号：\n   - 若包含重大不兼容变更（Breaking Change） → 升级主版本号（Major，如 `v1.2.3` -\u003e `v2.0.0`）\n   - 若包含新特性且向下兼容 → 升级次版本号（Minor，如 `v1.2.3` -\u003e `v1.3.0`）\n   - 若仅包含 Bug 修复或日常优化 → 升级修订号（Patch，如 `v1.2.3` -\u003e `v1.2.4`）\n2. **打 Tag**：在用户确认版本号后，准备在本地执行：\n   `git tag -a \u003cversion_name\u003e -m \"Release \u003cversion_name\u003e: \u003cbrief_summary\u003e\"`\n\n### 阶段 4：文档深度可视化渲染（核心特色）\n为了确保项目“一眼看清”，必须为项目创建或更新 `README.md`。该文档必须包含以下三个维度的可视化图表（使用 **Mermaid** 格式嵌入）：\n\n#### 1. 架构一眼清（Architecture Visualization）\n* **展示形式**：系统模块图、类图或思维导图。\n* **内容要求**：清晰体现项目有哪些核心文件夹/模块，它们之间是如何分层和交互的。\n\n#### 2. 逻辑一眼清（Runtime \u0026 Logic Flow）\n* **展示形式**：流程图（Flowchart）或时序图（Sequence Diagram）。\n* **内容要求**：直观展示项目启动后，数据的输入、处理、输出的完整核心运行生命周期。\n\n#### 3. 迭代一眼清（Iteration History）\n* **展示形式**：时间线图（Timeline）或甘特图/演进图。\n* **内容要求**：列出核心版本节点（如 v1.0.0 骨架搭建，v1.1.0 引入某特性，当前版本的定位等），展示迭代演进脉络。\n\n\u003e [!IMPORTANT]\n\u003e **Mermaid 语法防崩溃红线约束**：\n\u003e 1. 所有节点标签中的中文、括号、特殊字符，**必须使用双引号包裹**。例如，使用 `A[\"用户输入 (Prompt)\"]`，严禁使用 `A[用户输入 (Prompt)]`。\n\u003e 2. 避免在节点名称中直接使用 `[` `]` `(` `)` `\"` 等控制字符，如果必须使用，需使用转义或 HTML 实体。\n\u003e 3. 连接线描述若包含空格，线型两端必须加双引号，如 `A --\u003e|\"/deploy-config 触发\"| B`。\n\u003e 4. 生成完毕后，在当前上下文中对 Mermaid 代码块进行静默语法扫描，确保不存在未闭合的括号。\n\n展示生成的 `README.md` 预览（特别是 Mermaid 代码块），供用户审阅。\n\n### 阶段 5：GitHub 远端同步与 Release 封存\n1. **推送本地修改与 Tag**：\n   - 提交更新后的 `README.md` 和 `Changelog` 到当前分支：\n     `git add README.md` (如有单独 Changelog 文档则一并 add)\n     `git commit -m \"docs: update README with visualization for \u003cversion_name\u003e\"`\n   - 推送代码到远端：`git push origin \u003ccurrent_branch\u003e`\n   - 推送本地 Tag 到远端：`git push origin \u003cversion_name\u003e`\n2. **GitHub Release 线上存档**：\n   - 如果本地配置了 `gh` CLI 命令行工具，则直接使用命令行创建：\n     `gh release create \u003cversion_name\u003e --title \"Release \u003cversion_name\u003e\" --notes \"\u003cchangelog_content\u003e\"`\n   - 若无命令行工具，则协助生成完整的 **GitHub Release 发布指南草稿**，提供可以直接一键复制的 Markdown 内容，并给出浏览器创建 Release 存档的快速链接（`https://github.com/\u003cowner\u003e/\u003crepo\u003e/releases/new?tag=\u003cversion_name\u003e`）。\n\n---\n\n## 💬 交互示例与提问模板\n\n* *在前置检查发现未提交修改时*：\n  \u003e “🚨 **工作区体检报告**：我发现您当前还有未提交的本地修改：\n  \u003e `[修改列表]`\n  \u003e 建议您先进行 Commit。您是希望我先帮您把这部分修改提交为草稿，还是直接强制忽略并继续存档流程？”\n  \n* *在生成 Mermaid 图表供用户审阅时*：\n  \u003e “📊 **README 可视化图表已就绪！**\n  \u003e 我为您在 `README.md` 中设计了三张 Mermaid 架构和逻辑图，分别是一眼看清架构的模块图、一眼看清启动与运行逻辑的流程图、以及记录本次迭代演进的时间线。\n  \u003e \n  \u003e 您可以复制下方代码在编辑器中预览。是否有细节需要我微调，或者咱们直接进入推送到 GitHub 的步骤？”\n", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}, {"name": "internal-comms", "title": "internal-comms", "description": "A set of resources to help me write all kinds of internal communications, using the formats that my company likes to use. Claude should use this skill whenever asked to write some sort of internal communications (status reports, leadership updates, 3P updates, company newsletters, FAQs, incident reports, project updates, etc.).", "category": "productivity", "tags": [], "status": "active", "score": 10.0, "usage_count": 0, "last_used_date": "N/A", "source_type": "custom", "path": "source/custom/productivity/internal-comms", "full_content": "---\nname: internal-comms\ndescription: A set of resources to help me write all kinds of internal communications, using the formats that my company likes to use. Claude should use this skill whenever asked to write some sort of internal communications (status reports, leadership updates, 3P updates, company newsletters, FAQs, incident reports, project updates, etc.).\nlicense: Complete terms in LICENSE.txt\n---\n\n## When to use this skill\nTo write internal communications, use this skill for:\n- 3P updates (Progress, Plans, Problems)\n- Company newsletters\n- FAQ responses\n- Status reports\n- Leadership updates\n- Project updates\n- Incident reports\n\n## How to use this skill\n\nTo write any internal communication:\n\n1. **Identify the communication type** from the request\n2. **Load the appropriate guideline file** from the `examples/` directory:\n    - `examples/3p-updates.md` - For Progress/Plans/Problems team updates\n    - `examples/company-newsletter.md` - For company-wide newsletters\n    - `examples/faq-answers.md` - For answering frequently asked questions\n    - `examples/general-comms.md` - For anything else that doesn't explicitly match one of the above\n3. **Follow the specific instructions** in that file for formatting, tone, and content gathering\n\nIf the communication type doesn't match any existing guideline, ask for clarification or more context about the desired format.\n\n## Keywords\n3P updates, company newsletter, company comms, weekly update, faqs, common questions, updates, internal comms\n", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}, {"name": "pdf", "title": "pdf", "description": "Comprehensive PDF manipulation toolkit for extracting text and tables, creating new PDFs, merging/splitting documents, and handling forms. When Claude needs to fill in a PDF form or programmatically process, generate, or analyze PDF documents at scale.", "category": "productivity", "tags": [], "status": "active", "score": 10.0, "usage_count": 0, "last_used_date": "N/A", "source_type": "custom", "path": "source/custom/productivity/pdf", "full_content": "---\nname: pdf\ndescription: Comprehensive PDF manipulation toolkit for extracting text and tables, creating new PDFs, merging/splitting documents, and handling forms. When Claude needs to fill in a PDF form or programmatically process, generate, or analyze PDF documents at scale.\nlicense: Proprietary. LICENSE.txt has complete terms\n---\n\n# PDF Processing Guide\n\n## Overview\n\nThis guide covers essential PDF processing operations using Python libraries and command-line tools. For advanced features, JavaScript libraries, and detailed examples, see reference.md. If you need to fill out a PDF form, read forms.md and follow its instructions.\n\n## Quick Start\n\n```python\nfrom pypdf import PdfReader, PdfWriter\n\n# Read a PDF\nreader = PdfReader(\"document.pdf\")\nprint(f\"Pages: {len(reader.pages)}\")\n\n# Extract text\ntext = \"\"\nfor page in reader.pages:\n    text += page.extract_text()\n```\n\n## Python Libraries\n\n### pypdf - Basic Operations\n\n#### Merge PDFs\n```python\nfrom pypdf import PdfWriter, PdfReader\n\nwriter = PdfWriter()\nfor pdf_file in [\"doc1.pdf\", \"doc2.pdf\", \"doc3.pdf\"]:\n    reader = PdfReader(pdf_file)\n    for page in reader.pages:\n        writer.add_page(page)\n\nwith open(\"merged.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n#### Split PDF\n```python\nreader = PdfReader(\"input.pdf\")\nfor i, page in enumerate(reader.pages):\n    writer = PdfWriter()\n    writer.add_page(page)\n    with open(f\"page_{i+1}.pdf\", \"wb\") as output:\n        writer.write(output)\n```\n\n#### Extract Metadata\n```python\nreader = PdfReader(\"document.pdf\")\nmeta = reader.metadata\nprint(f\"Title: {meta.title}\")\nprint(f\"Author: {meta.author}\")\nprint(f\"Subject: {meta.subject}\")\nprint(f\"Creator: {meta.creator}\")\n```\n\n#### Rotate Pages\n```python\nreader = PdfReader(\"input.pdf\")\nwriter = PdfWriter()\n\npage = reader.pages[0]\npage.rotate(90)  # Rotate 90 degrees clockwise\nwriter.add_page(page)\n\nwith open(\"rotated.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n### pdfplumber - Text and Table Extraction\n\n#### Extract Text with Layout\n```python\nimport pdfplumber\n\nwith pdfplumber.open(\"document.pdf\") as pdf:\n    for page in pdf.pages:\n        text = page.extract_text()\n        print(text)\n```\n\n#### Extract Tables\n```python\nwith pdfplumber.open(\"document.pdf\") as pdf:\n    for i, page in enumerate(pdf.pages):\n        tables = page.extract_tables()\n        for j, table in enumerate(tables):\n            print(f\"Table {j+1} on page {i+1}:\")\n            for row in table:\n                print(row)\n```\n\n#### Advanced Table Extraction\n```python\nimport pandas as pd\n\nwith pdfplumber.open(\"document.pdf\") as pdf:\n    all_tables = []\n    for page in pdf.pages:\n        tables = page.extract_tables()\n        for table in tables:\n            if table:  # Check if table is not empty\n                df = pd.DataFrame(table[1:], columns=table[0])\n                all_tables.append(df)\n\n# Combine all tables\nif all_tables:\n    combined_df = pd.concat(all_tables, ignore_index=True)\n    combined_df.to_excel(\"extracted_tables.xlsx\", index=False)\n```\n\n### reportlab - Create PDFs\n\n#### Basic PDF Creation\n```python\nfrom reportlab.lib.pagesizes import letter\nfrom reportlab.pdfgen import canvas\n\nc = canvas.Canvas(\"hello.pdf\", pagesize=letter)\nwidth, height = letter\n\n# Add text\nc.drawString(100, height - 100, \"Hello World!\")\nc.drawString(100, height - 120, \"This is a PDF created with reportlab\")\n\n# Add a line\nc.line(100, height - 140, 400, height - 140)\n\n# Save\nc.save()\n```\n\n#### Create PDF with Multiple Pages\n```python\nfrom reportlab.lib.pagesizes import letter\nfrom reportlab.platypus import SimpleDocTemplate, Paragraph, Spacer, PageBreak\nfrom reportlab.lib.styles import getSampleStyleSheet\n\ndoc = SimpleDocTemplate(\"report.pdf\", pagesize=letter)\nstyles = getSampleStyleSheet()\nstory = []\n\n# Add content\ntitle = Paragraph(\"Report Title\", styles['Title'])\nstory.append(title)\nstory.append(Spacer(1, 12))\n\nbody = Paragraph(\"This is the body of the report. \" * 20, styles['Normal'])\nstory.append(body)\nstory.append(PageBreak())\n\n# Page 2\nstory.append(Paragraph(\"Page 2\", styles['Heading1']))\nstory.append(Paragraph(\"Content for page 2\", styles['Normal']))\n\n# Build PDF\ndoc.build(story)\n```\n\n## Command-Line Tools\n\n### pdftotext (poppler-utils)\n```bash\n# Extract text\npdftotext input.pdf output.txt\n\n# Extract text preserving layout\npdftotext -layout input.pdf output.txt\n\n# Extract specific pages\npdftotext -f 1 -l 5 input.pdf output.txt  # Pages 1-5\n```\n\n### qpdf\n```bash\n# Merge PDFs\nqpdf --empty --pages file1.pdf file2.pdf -- merged.pdf\n\n# Split pages\nqpdf input.pdf --pages . 1-5 -- pages1-5.pdf\nqpdf input.pdf --pages . 6-10 -- pages6-10.pdf\n\n# Rotate pages\nqpdf input.pdf output.pdf --rotate=+90:1  # Rotate page 1 by 90 degrees\n\n# Remove password\nqpdf --password=mypassword --decrypt encrypted.pdf decrypted.pdf\n```\n\n### pdftk (if available)\n```bash\n# Merge\npdftk file1.pdf file2.pdf cat output merged.pdf\n\n# Split\npdftk input.pdf burst\n\n# Rotate\npdftk input.pdf rotate 1east output rotated.pdf\n```\n\n## Common Tasks\n\n### Extract Text from Scanned PDFs\n```python\n# Requires: pip install pytesseract pdf2image\nimport pytesseract\nfrom pdf2image import convert_from_path\n\n# Convert PDF to images\nimages = convert_from_path('scanned.pdf')\n\n# OCR each page\ntext = \"\"\nfor i, image in enumerate(images):\n    text += f\"Page {i+1}:\\n\"\n    text += pytesseract.image_to_string(image)\n    text += \"\\n\\n\"\n\nprint(text)\n```\n\n### Add Watermark\n```python\nfrom pypdf import PdfReader, PdfWriter\n\n# Create watermark (or load existing)\nwatermark = PdfReader(\"watermark.pdf\").pages[0]\n\n# Apply to all pages\nreader = PdfReader(\"document.pdf\")\nwriter = PdfWriter()\n\nfor page in reader.pages:\n    page.merge_page(watermark)\n    writer.add_page(page)\n\nwith open(\"watermarked.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n### Extract Images\n```bash\n# Using pdfimages (poppler-utils)\npdfimages -j input.pdf output_prefix\n\n# This extracts all images as output_prefix-000.jpg, output_prefix-001.jpg, etc.\n```\n\n### Password Protection\n```python\nfrom pypdf import PdfReader, PdfWriter\n\nreader = PdfReader(\"input.pdf\")\nwriter = PdfWriter()\n\nfor page in reader.pages:\n    writer.add_page(page)\n\n# Add password\nwriter.encrypt(\"userpassword\", \"ownerpassword\")\n\nwith open(\"encrypted.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n## Quick Reference\n\n| Task | Best Tool | Command/Code |\n|------|-----------|--------------|\n| Merge PDFs | pypdf | `writer.add_page(page)` |\n| Split PDFs | pypdf | One page per file |\n| Extract text | pdfplumber | `page.extract_text()` |\n| Extract tables | pdfplumber | `page.extract_tables()` |\n| Create PDFs | reportlab | Canvas or Platypus |\n| Command line merge | qpdf | `qpdf --empty --pages ...` |\n| OCR scanned PDFs | pytesseract | Convert to image first |\n| Fill PDF forms | pdf-lib or pypdf (see forms.md) | See forms.md |\n\n## Next Steps\n\n- For advanced pypdfium2 usage, see reference.md\n- For JavaScript libraries (pdf-lib), see reference.md\n- If you need to fill out a PDF form, follow the instructions in forms.md\n- For troubleshooting guides, see reference.md\n", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}, {"name": "pptx", "title": "pptx", "description": "Presentation creation, editing, and analysis. When Claude needs to work with presentations (.pptx files) for: (1) Creating new presentations, (2) Modifying or editing content, (3) Working with layouts, (4) Adding comments or speaker notes, or any other presentation tasks", "category": "productivity", "tags": [], "status": "active", "score": 10.0, "usage_count": 0, "last_used_date": "N/A", "source_type": "custom", "path": "source/custom/productivity/pptx", "full_content": "---\nname: pptx\ndescription: \"Presentation creation, editing, and analysis. When Claude needs to work with presentations (.pptx files) for: (1) Creating new presentations, (2) Modifying or editing content, (3) Working with layouts, (4) Adding comments or speaker notes, or any other presentation tasks\"\nlicense: Proprietary. LICENSE.txt has complete terms\n---\n\n# PPTX creation, editing, and analysis\n\n## Overview\n\nA user may ask you to create, edit, or analyze the contents of a .pptx file. A .pptx file is essentially a ZIP archive containing XML files and other resources that you can read or edit. You have different tools and workflows available for different tasks.\n\n## Reading and analyzing content\n\n### Text extraction\nIf you just need to read the text contents of a presentation, you should convert the document to markdown:\n\n```bash\n# Convert document to markdown\npython -m markitdown path-to-file.pptx\n```\n\n### Raw XML access\nYou need raw XML access for: comments, speaker notes, slide layouts, animations, design elements, and complex formatting. For any of these features, you'll need to unpack a presentation and read its raw XML contents.\n\n#### Unpacking a file\n`python ooxml/scripts/unpack.py \u003coffice_file\u003e \u003coutput_dir\u003e`\n\n**Note**: The unpack.py script is located at `skills/pptx/ooxml/scripts/unpack.py` relative to the project root. If the script doesn't exist at this path, use `find . -name \"unpack.py\"` to locate it.\n\n#### Key file structures\n* `ppt/presentation.xml` - Main presentation metadata and slide references\n* `ppt/slides/slide{N}.xml` - Individual slide contents (slide1.xml, slide2.xml, etc.)\n* `ppt/notesSlides/notesSlide{N}.xml` - Speaker notes for each slide\n* `ppt/comments/modernComment_*.xml` - Comments for specific slides\n* `ppt/slideLayouts/` - Layout templates for slides\n* `ppt/slideMasters/` - Master slide templates\n* `ppt/theme/` - Theme and styling information\n* `ppt/media/` - Images and other media files\n\n#### Typography and color extraction\n**When given an example design to emulate**: Always analyze the presentation's typography and colors first using the methods below:\n1. **Read theme file**: Check `ppt/theme/theme1.xml` for colors (`\u003ca:clrScheme\u003e`) and fonts (`\u003ca:fontScheme\u003e`)\n2. **Sample slide content**: Examine `ppt/slides/slide1.xml` for actual font usage (`\u003ca:rPr\u003e`) and colors\n3. **Search for patterns**: Use grep to find color (`\u003ca:solidFill\u003e`, `\u003ca:srgbClr\u003e`) and font references across all XML files\n\n## Creating a new PowerPoint presentation **without a template**\n\nWhen creating a new PowerPoint presentation from scratch, use the **html2pptx** workflow to convert HTML slides to PowerPoint with accurate positioning.\n\n### Design Principles\n\n**CRITICAL**: Before creating any presentation, analyze the content and choose appropriate design elements:\n1. **Consider the subject matter**: What is this presentation about? What tone, industry, or mood does it suggest?\n2. **Check for branding**: If the user mentions a company/organization, consider their brand colors and identity\n3. **Match palette to content**: Select colors that reflect the subject\n4. **State your approach**: Explain your design choices before writing code\n\n**Requirements**:\n- ✅ State your content-informed design approach BEFORE writing code\n- ✅ Use web-safe fonts only: Arial, Helvetica, Times New Roman, Georgia, Courier New, Verdana, Tahoma, Trebuchet MS, Impact\n- ✅ Create clear visual hierarchy through size, weight, and color\n- ✅ Ensure readability: strong contrast, appropriately sized text, clean alignment\n- ✅ Be consistent: repeat patterns, spacing, and visual language across slides\n\n#### Color Palette Selection\n\n**Choosing colors creatively**:\n- **Think beyond defaults**: What colors genuinely match this specific topic? Avoid autopilot choices.\n- **Consider multiple angles**: Topic, industry, mood, energy level, target audience, brand identity (if mentioned)\n- **Be adventurous**: Try unexpected combinations - a healthcare presentation doesn't have to be green, finance doesn't have to be navy\n- **Build your palette**: Pick 3-5 colors that work together (dominant colors + supporting tones + accent)\n- **Ensure contrast**: Text must be clearly readable on backgrounds\n\n**Example color palettes** (use these to spark creativity - choose one, adapt it, or create your own):\n\n1. **Classic Blue**: Deep navy (#1C2833), slate gray (#2E4053), silver (#AAB7B8), off-white (#F4F6F6)\n2. **Teal \u0026 Coral**: Teal (#5EA8A7), deep teal (#277884), coral (#FE4447), white (#FFFFFF)\n3. **Bold Red**: Red (#C0392B), bright red (#E74C3C), orange (#F39C12), yellow (#F1C40F), green (#2ECC71)\n4. **Warm Blush**: Mauve (#A49393), blush (#EED6D3), rose (#E8B4B8), cream (#FAF7F2)\n5. **Burgundy Luxury**: Burgundy (#5D1D2E), crimson (#951233), rust (#C15937), gold (#997929)\n6. **Deep Purple \u0026 Emerald**: Purple (#B165FB), dark blue (#181B24), emerald (#40695B), white (#FFFFFF)\n7. **Cream \u0026 Forest Green**: Cream (#FFE1C7), forest green (#40695B), white (#FCFCFC)\n8. **Pink \u0026 Purple**: Pink (#F8275B), coral (#FF574A), rose (#FF737D), purple (#3D2F68)\n9. **Lime \u0026 Plum**: Lime (#C5DE82), plum (#7C3A5F), coral (#FD8C6E), blue-gray (#98ACB5)\n10. **Black \u0026 Gold**: Gold (#BF9A4A), black (#000000), cream (#F4F6F6)\n11. **Sage \u0026 Terracotta**: Sage (#87A96B), terracotta (#E07A5F), cream (#F4F1DE), charcoal (#2C2C2C)\n12. **Charcoal \u0026 Red**: Charcoal (#292929), red (#E33737), light gray (#CCCBCB)\n13. **Vibrant Orange**: Orange (#F96D00), light gray (#F2F2F2), charcoal (#222831)\n14. **Forest Green**: Black (#191A19), green (#4E9F3D), dark green (#1E5128), white (#FFFFFF)\n15. **Retro Rainbow**: Purple (#722880), pink (#D72D51), orange (#EB5C18), amber (#F08800), gold (#DEB600)\n16. **Vintage Earthy**: Mustard (#E3B448), sage (#CBD18F), forest green (#3A6B35), cream (#F4F1DE)\n17. **Coastal Rose**: Old rose (#AD7670), beaver (#B49886), eggshell (#F3ECDC), ash gray (#BFD5BE)\n18. **Orange \u0026 Turquoise**: Light orange (#FC993E), grayish turquoise (#667C6F), white (#FCFCFC)\n\n#### Visual Details Options\n\n**Geometric Patterns**:\n- Diagonal section dividers instead of horizontal\n- Asymmetric column widths (30/70, 40/60, 25/75)\n- Rotated text headers at 90° or 270°\n- Circular/hexagonal frames for images\n- Triangular accent shapes in corners\n- Overlapping shapes for depth\n\n**Border \u0026 Frame Treatments**:\n- Thick single-color borders (10-20pt) on one side only\n- Double-line borders with contrasting colors\n- Corner brackets instead of full frames\n- L-shaped borders (top+left or bottom+right)\n- Underline accents beneath headers (3-5pt thick)\n\n**Typography Treatments**:\n- Extreme size contrast (72pt headlines vs 11pt body)\n- All-caps headers with wide letter spacing\n- Numbered sections in oversized display type\n- Monospace (Courier New) for data/stats/technical content\n- Condensed fonts (Arial Narrow) for dense information\n- Outlined text for emphasis\n\n**Chart \u0026 Data Styling**:\n- Monochrome charts with single accent color for key data\n- Horizontal bar charts instead of vertical\n- Dot plots instead of bar charts\n- Minimal gridlines or none at all\n- Data labels directly on elements (no legends)\n- Oversized numbers for key metrics\n\n**Layout Innovations**:\n- Full-bleed images with text overlays\n- Sidebar column (20-30% width) for navigation/context\n- Modular grid systems (3×3, 4×4 blocks)\n- Z-pattern or F-pattern content flow\n- Floating text boxes over colored shapes\n- Magazine-style multi-column layouts\n\n**Background Treatments**:\n- Solid color blocks occupying 40-60% of slide\n- Gradient fills (vertical or diagonal only)\n- Split backgrounds (two colors, diagonal or vertical)\n- Edge-to-edge color bands\n- Negative space as a design element\n\n### Layout Tips\n**When creating slides with charts or tables:**\n- **Two-column layout (PREFERRED)**: Use a header spanning the full width, then two columns below - text/bullets in one column and the featured content in the other. This provides better balance and makes charts/tables more readable. Use flexbox with unequal column widths (e.g., 40%/60% split) to optimize space for each content type.\n- **Full-slide layout**: Let the featured content (chart/table) take up the entire slide for maximum impact and readability\n- **NEVER vertically stack**: Do not place charts/tables below text in a single column - this causes poor readability and layout issues\n\n### Workflow\n1. **MANDATORY - READ ENTIRE FILE**: Read [`html2pptx.md`](html2pptx.md) completely from start to finish. **NEVER set any range limits when reading this file.** Read the full file content for detailed syntax, critical formatting rules, and best practices before proceeding with presentation creation.\n2. Create an HTML file for each slide with proper dimensions (e.g., 720pt × 405pt for 16:9)\n   - Use `\u003cp\u003e`, `\u003ch1\u003e`-`\u003ch6\u003e`, `\u003cul\u003e`, `\u003col\u003e` for all text content\n   - Use `class=\"placeholder\"` for areas where charts/tables will be added (render with gray background for visibility)\n   - **CRITICAL**: Rasterize gradients and icons as PNG images FIRST using Sharp, then reference in HTML\n   - **LAYOUT**: For slides with charts/tables/images, use either full-slide layout or two-column layout for better readability\n3. Create and run a JavaScript file using the [`html2pptx.js`](scripts/html2pptx.js) library to convert HTML slides to PowerPoint and save the presentation\n   - Use the `html2pptx()` function to process each HTML file\n   - Add charts and tables to placeholder areas using PptxGenJS API\n   - Save the presentation using `pptx.writeFile()`\n4. **Visual validation**: Generate thumbnails and inspect for layout issues\n   - Create thumbnail grid: `python scripts/thumbnail.py output.pptx workspace/thumbnails --cols 4`\n   - Read and carefully examine the thumbnail image for:\n     - **Text cutoff**: Text being cut off by header bars, shapes, or slide edges\n     - **Text overlap**: Text overlapping with other text or shapes\n     - **Positioning issues**: Content too close to slide boundaries or other elements\n     - **Contrast issues**: Insufficient contrast between text and backgrounds\n   - If issues found, adjust HTML margins/spacing/colors and regenerate the presentation\n   - Repeat until all slides are visually correct\n\n## Editing an existing PowerPoint presentation\n\nWhen edit slides in an existing PowerPoint presentation, you need to work with the raw Office Open XML (OOXML) format. This involves unpacking the .pptx file, editing the XML content, and repacking it.\n\n### Workflow\n1. **MANDATORY - READ ENTIRE FILE**: Read [`ooxml.md`](ooxml.md) (~500 lines) completely from start to finish.  **NEVER set any range limits when reading this file.**  Read the full file content for detailed guidance on OOXML structure and editing workflows before any presentation editing.\n2. Unpack the presentation: `python ooxml/scripts/unpack.py \u003coffice_file\u003e \u003coutput_dir\u003e`\n3. Edit the XML files (primarily `ppt/slides/slide{N}.xml` and related files)\n4. **CRITICAL**: Validate immediately after each edit and fix any validation errors before proceeding: `python ooxml/scripts/validate.py \u003cdir\u003e --original \u003cfile\u003e`\n5. Pack the final presentation: `python ooxml/scripts/pack.py \u003cinput_directory\u003e \u003coffice_file\u003e`\n\n## Creating a new PowerPoint presentation **using a template**\n\nWhen you need to create a presentation that follows an existing template's design, you'll need to duplicate and re-arrange template slides before then replacing placeholder context.\n\n### Workflow\n1. **Extract template text AND create visual thumbnail grid**:\n   * Extract text: `python -m markitdown template.pptx \u003e template-content.md`\n   * Read `template-content.md`: Read the entire file to understand the contents of the template presentation. **NEVER set any range limits when reading this file.**\n   * Create thumbnail grids: `python scripts/thumbnail.py template.pptx`\n   * See [Creating Thumbnail Grids](#creating-thumbnail-grids) section for more details\n\n2. **Analyze template and save inventory to a file**:\n   * **Visual Analysis**: Review thumbnail grid(s) to understand slide layouts, design patterns, and visual structure\n   * Create and save a template inventory file at `template-inventory.md` containing:\n     ```markdown\n     # Template Inventory Analysis\n     **Total Slides: [count]**\n     **IMPORTANT: Slides are 0-indexed (first slide = 0, last slide = count-1)**\n\n     ## [Category Name]\n     - Slide 0: [Layout code if available] - Description/purpose\n     - Slide 1: [Layout code] - Description/purpose\n     - Slide 2: [Layout code] - Description/purpose\n     [... EVERY slide must be listed individually with its index ...]\n     ```\n   * **Using the thumbnail grid**: Reference the visual thumbnails to identify:\n     - Layout patterns (title slides, content layouts, section dividers)\n     - Image placeholder locations and counts\n     - Design consistency across slide groups\n     - Visual hierarchy and structure\n   * This inventory file is REQUIRED for selecting appropriate templates in the next step\n\n3. **Create presentation outline based on template inventory**:\n   * Review available templates from step 2.\n   * Choose an intro or title template for the first slide. This should be one of the first templates.\n   * Choose safe, text-based layouts for the other slides.\n   * **CRITICAL: Match layout structure to actual content**:\n     - Single-column layouts: Use for unified narrative or single topic\n     - Two-column layouts: Use ONLY when you have exactly 2 distinct items/concepts\n     - Three-column layouts: Use ONLY when you have exactly 3 distinct items/concepts\n     - Image + text layouts: Use ONLY when you have actual images to insert\n     - Quote layouts: Use ONLY for actual quotes from people (with attribution), never for emphasis\n     - Never use layouts with more placeholders than you have content\n     - If you have 2 items, don't force them into a 3-column layout\n     - If you have 4+ items, consider breaking into multiple slides or using a list format\n   * Count your actual content pieces BEFORE selecting the layout\n   * Verify each placeholder in the chosen layout will be filled with meaningful content\n   * Select one option representing the **best** layout for each content section.\n   * Save `outline.md` with content AND template mapping that leverages available designs\n   * Example template mapping:\n      ```\n      # Template slides to use (0-based indexing)\n      # WARNING: Verify indices are within range! Template with 73 slides has indices 0-72\n      # Mapping: slide numbers from outline -\u003e template slide indices\n      template_mapping = [\n          0,   # Use slide 0 (Title/Cover)\n          34,  # Use slide 34 (B1: Title and body)\n          34,  # Use slide 34 again (duplicate for second B1)\n          50,  # Use slide 50 (E1: Quote)\n          54,  # Use slide 54 (F2: Closing + Text)\n      ]\n      ```\n\n4. **Duplicate, reorder, and delete slides using `rearrange.py`**:\n   * Use the `scripts/rearrange.py` script to create a new presentation with slides in the desired order:\n     ```bash\n     python scripts/rearrange.py template.pptx working.pptx 0,34,34,50,52\n     ```\n   * The script handles duplicating repeated slides, deleting unused slides, and reordering automatically\n   * Slide indices are 0-based (first slide is 0, second is 1, etc.)\n   * The same slide index can appear multiple times to duplicate that slide\n\n5. **Extract ALL text using the `inventory.py` script**:\n   * **Run inventory extraction**:\n     ```bash\n     python scripts/inventory.py working.pptx text-inventory.json\n     ```\n   * **Read text-inventory.json**: Read the entire text-inventory.json file to understand all shapes and their properties. **NEVER set any range limits when reading this file.**\n\n   * The inventory JSON structure:\n      ```json\n        {\n          \"slide-0\": {\n            \"shape-0\": {\n              \"placeholder_type\": \"TITLE\",  // or null for non-placeholders\n              \"left\": 1.5,                  // position in inches\n              \"top\": 2.0,\n              \"width\": 7.5,\n              \"height\": 1.2,\n              \"paragraphs\": [\n                {\n                  \"text\": \"Paragraph text\",\n                  // Optional properties (only included when non-default):\n                  \"bullet\": true,           // explicit bullet detected\n                  \"level\": 0,               // only included when bullet is true\n                  \"alignment\": \"CENTER\",    // CENTER, RIGHT (not LEFT)\n                  \"space_before\": 10.0,     // space before paragraph in points\n                  \"space_after\": 6.0,       // space after paragraph in points\n                  \"line_spacing\": 22.4,     // line spacing in points\n                  \"font_name\": \"Arial\",     // from first run\n                  \"font_size\": 14.0,        // in points\n                  \"bold\": true,\n                  \"italic\": false,\n                  \"underline\": false,\n                  \"color\": \"FF0000\"         // RGB color\n                }\n              ]\n            }\n          }\n        }\n      ```\n\n   * Key features:\n     - **Slides**: Named as \"slide-0\", \"slide-1\", etc.\n     - **Shapes**: Ordered by visual position (top-to-bottom, left-to-right) as \"shape-0\", \"shape-1\", etc.\n     - **Placeholder types**: TITLE, CENTER_TITLE, SUBTITLE, BODY, OBJECT, or null\n     - **Default font size**: `default_font_size` in points extracted from layout placeholders (when available)\n     - **Slide numbers are filtered**: Shapes with SLIDE_NUMBER placeholder type are automatically excluded from inventory\n     - **Bullets**: When `bullet: true`, `level` is always included (even if 0)\n     - **Spacing**: `space_before`, `space_after`, and `line_spacing` in points (only included when set)\n     - **Colors**: `color` for RGB (e.g., \"FF0000\"), `theme_color` for theme colors (e.g., \"DARK_1\")\n     - **Properties**: Only non-default values are included in the output\n\n6. **Generate replacement text and save the data to a JSON file**\n   Based on the text inventory from the previous step:\n   - **CRITICAL**: First verify which shapes exist in the inventory - only reference shapes that are actually present\n   - **VALIDATION**: The replace.py script will validate that all shapes in your replacement JSON exist in the inventory\n     - If you reference a non-existent shape, you'll get an error showing available shapes\n     - If you reference a non-existent slide, you'll get an error indicating the slide doesn't exist\n     - All validation errors are shown at once before the script exits\n   - **IMPORTANT**: The replace.py script uses inventory.py internally to identify ALL text shapes\n   - **AUTOMATIC CLEARING**: ALL text shapes from the inventory will be cleared unless you provide \"paragraphs\" for them\n   - Add a \"paragraphs\" field to shapes that need content (not \"replacement_paragraphs\")\n   - Shapes without \"paragraphs\" in the replacement JSON will have their text cleared automatically\n   - Paragraphs with bullets will be automatically left aligned. Don't set the `alignment` property on when `\"bullet\": true`\n   - Generate appropriate replacement content for placeholder text\n   - Use shape size to determine appropriate content length\n   - **CRITICAL**: Include paragraph properties from the original inventory - don't just provide text\n   - **IMPORTANT**: When bullet: true, do NOT include bullet symbols (•, -, *) in text - they're added automatically\n   - **ESSENTIAL FORMATTING RULES**:\n     - Headers/titles should typically have `\"bold\": true`\n     - List items should have `\"bullet\": true, \"level\": 0` (level is required when bullet is true)\n     - Preserve any alignment properties (e.g., `\"alignment\": \"CENTER\"` for centered text)\n     - Include font properties when different from default (e.g., `\"font_size\": 14.0`, `\"font_name\": \"Lora\"`)\n     - Colors: Use `\"color\": \"FF0000\"` for RGB or `\"theme_color\": \"DARK_1\"` for theme colors\n     - The replacement script expects **properly formatted paragraphs**, not just text strings\n     - **Overlapping shapes**: Prefer shapes with larger default_font_size or more appropriate placeholder_type\n   - Save the updated inventory with replacements to `replacement-text.json`\n   - **WARNING**: Different template layouts have different shape counts - always check the actual inventory before creating replacements\n\n   Example paragraphs field showing proper formatting:\n   ```json\n   \"paragraphs\": [\n     {\n       \"text\": \"New presentation title text\",\n       \"alignment\": \"CENTER\",\n       \"bold\": true\n     },\n     {\n       \"text\": \"Section Header\",\n       \"bold\": true\n     },\n     {\n       \"text\": \"First bullet point without bullet symbol\",\n       \"bullet\": true,\n       \"level\": 0\n     },\n     {\n       \"text\": \"Red colored text\",\n       \"color\": \"FF0000\"\n     },\n     {\n       \"text\": \"Theme colored text\",\n       \"theme_color\": \"DARK_1\"\n     },\n     {\n       \"text\": \"Regular paragraph text without special formatting\"\n     }\n   ]\n   ```\n\n   **Shapes not listed in the replacement JSON are automatically cleared**:\n   ```json\n   {\n     \"slide-0\": {\n       \"shape-0\": {\n         \"paragraphs\": [...] // This shape gets new text\n       }\n       // shape-1 and shape-2 from inventory will be cleared automatically\n     }\n   }\n   ```\n\n   **Common formatting patterns for presentations**:\n   - Title slides: Bold text, sometimes centered\n   - Section headers within slides: Bold text\n   - Bullet lists: Each item needs `\"bullet\": true, \"level\": 0`\n   - Body text: Usually no special properties needed\n   - Quotes: May have special alignment or font properties\n\n7. **Apply replacements using the `replace.py` script**\n   ```bash\n   python scripts/replace.py working.pptx replacement-text.json output.pptx\n   ```\n\n   The script will:\n   - First extract the inventory of ALL text shapes using functions from inventory.py\n   - Validate that all shapes in the replacement JSON exist in the inventory\n   - Clear text from ALL shapes identified in the inventory\n   - Apply new text only to shapes with \"paragraphs\" defined in the replacement JSON\n   - Preserve formatting by applying paragraph properties from the JSON\n   - Handle bullets, alignment, font properties, and colors automatically\n   - Save the updated presentation\n\n   Example validation errors:\n   ```\n   ERROR: Invalid shapes in replacement JSON:\n     - Shape 'shape-99' not found on 'slide-0'. Available shapes: shape-0, shape-1, shape-4\n     - Slide 'slide-999' not found in inventory\n   ```\n\n   ```\n   ERROR: Replacement text made overflow worse in these shapes:\n     - slide-0/shape-2: overflow worsened by 1.25\" (was 0.00\", now 1.25\")\n   ```\n\n## Creating Thumbnail Grids\n\nTo create visual thumbnail grids of PowerPoint slides for quick analysis and reference:\n\n```bash\npython scripts/thumbnail.py template.pptx [output_prefix]\n```\n\n**Features**:\n- Creates: `thumbnails.jpg` (or `thumbnails-1.jpg`, `thumbnails-2.jpg`, etc. for large decks)\n- Default: 5 columns, max 30 slides per grid (5×6)\n- Custom prefix: `python scripts/thumbnail.py template.pptx my-grid`\n  - Note: The output prefix should include the path if you want output in a specific directory (e.g., `workspace/my-grid`)\n- Adjust columns: `--cols 4` (range: 3-6, affects slides per grid)\n- Grid limits: 3 cols = 12 slides/grid, 4 cols = 20, 5 cols = 30, 6 cols = 42\n- Slides are zero-indexed (Slide 0, Slide 1, etc.)\n\n**Use cases**:\n- Template analysis: Quickly understand slide layouts and design patterns\n- Content review: Visual overview of entire presentation\n- Navigation reference: Find specific slides by their visual appearance\n- Quality check: Verify all slides are properly formatted\n\n**Examples**:\n```bash\n# Basic usage\npython scripts/thumbnail.py presentation.pptx\n\n# Combine options: custom name, columns\npython scripts/thumbnail.py template.pptx analysis --cols 4\n```\n\n## Converting Slides to Images\n\nTo visually analyze PowerPoint slides, convert them to images using a two-step process:\n\n1. **Convert PPTX to PDF**:\n   ```bash\n   soffice --headless --convert-to pdf template.pptx\n   ```\n\n2. **Convert PDF pages to JPEG images**:\n   ```bash\n   pdftoppm -jpeg -r 150 template.pdf slide\n   ```\n   This creates files like `slide-1.jpg`, `slide-2.jpg`, etc.\n\nOptions:\n- `-r 150`: Sets resolution to 150 DPI (adjust for quality/size balance)\n- `-jpeg`: Output JPEG format (use `-png` for PNG if preferred)\n- `-f N`: First page to convert (e.g., `-f 2` starts from page 2)\n- `-l N`: Last page to convert (e.g., `-l 5` stops at page 5)\n- `slide`: Prefix for output files\n\nExample for specific range:\n```bash\npdftoppm -jpeg -r 150 -f 2 -l 5 template.pdf slide  # Converts only pages 2-5\n```\n\n## Code Style Guidelines\n**IMPORTANT**: When generating code for PPTX operations:\n- Write concise code\n- Avoid verbose variable names and redundant operations\n- Avoid unnecessary print statements\n\n## Dependencies\n\nRequired dependencies (should already be installed):\n\n- **markitdown**: `pip install \"markitdown[pptx]\"` (for text extraction from presentations)\n- **pptxgenjs**: `npm install -g pptxgenjs` (for creating presentations via html2pptx)\n- **playwright**: `npm install -g playwright` (for HTML rendering in html2pptx)\n- **react-icons**: `npm install -g react-icons react react-dom` (for icons)\n- **sharp**: `npm install -g sharp` (for SVG rasterization and image processing)\n- **LibreOffice**: `sudo apt-get install libreoffice` (for PDF conversion)\n- **Poppler**: `sudo apt-get install poppler-utils` (for pdftoppm to convert PDF to images)\n- **defusedxml**: `pip install defusedxml` (for secure XML parsing)", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}, {"name": "skill-creator-cn", "title": "skill-creator-cn", "description": "创建、修改、改进 skill，并衡量其表现。当用户想从零做一个 skill、改进/调试已有 skill、把刚才对话里的流程\"变成 skill\"、或说\"我想做个 skill 但不知道怎么做\"\"帮我做个 skill\"时使用。也适用于优化 skill 的触发描述、跑评测。Use when the user wants to create, edit, debug, or evaluate a skill (Chinese or English).", "category": "productivity", "tags": [], "status": "active", "score": 10.0, "usage_count": 0, "last_used_date": "N/A", "source_type": "custom", "path": "source/custom/productivity/skill-creator-cn", "full_content": "---\nname: skill-creator-cn\ndescription: 创建、修改、改进 skill，并衡量其表现。当用户想从零做一个 skill、改进/调试已有 skill、把刚才对话里的流程\"变成 skill\"、或说\"我想做个 skill 但不知道怎么做\"\"帮我做个 skill\"时使用。也适用于优化 skill 的触发描述、跑评测。Use when the user wants to create, edit, debug, or evaluate a skill (Chinese or English).\n---\n\n# Skill Creator\n\n## 语言与水平指令\n\n**默认用中文与用户交流，跟随用户的语言切换**（用户改用英文则跟着切换）。\n\n全程自动识别用户的技术水平，**不要打断流程询问\"你是什么水平\"**——通过用户的措辞、上下文自动判断，并相应调整用词深度：\n- 用户说\"我不懂代码\"\"帮我做一个自动化\"→ 用日常语言，避免裸露的 JSON/assertion/eval 等术语（或用时简要解释）。\n- 用户说\"写个 SKILL.md\"\"跑 eval\"→ 可直接使用技术术语。\n- 中间态：术语按需解释，不过度科普也不假设对方都懂。\n\n详细的水平信号识别与提问节奏，见 `references/需求共创.md`。\n\n---\n\n## ① 前置 Triage（闸门）\n\n在进入任何创建/改进流程之前，先做三个快速判断：\n\n### 1. 这要不要做成 skill？\n\n判断标准：\n- **一次性任务**：用户只要做一次，做完就不用了 → 直接帮做，不必做成 skill。\n- **普通 prompt 够用**：Claude 不需要任何 skill 也能胜任 → 直说，不必做 skill。\n- **Claude 原生能干**：内置能力已覆盖，skill 不会带来额外价值 → 坦诚建议不必做。\n- **更适合 slash command 或 subagent**：任务是一次性调度或编排多个步骤，而非可复用流程 → 说明区别，建议替代方案。\n\n**命中后怎么做**：坦诚告诉用户\"这种情况不一定需要做成 skill，因为……\"，并提供直接帮助或替代建议。\n\n### 2. 有没有现成类似的？\n\n判断方法：扫一眼用户环境里已有的 skills 列表（`available_skills`），看有没有功能高度重叠的。\n\n**命中后怎么做**：告知用户已有类似 skill，建议先试用，或在现有 skill 上改进，而非重新造轮子。\n\n### 3. 范围太大？\n\n判断标准：用户描述的需求实际上涵盖了多个独立的、可拆分的工作流程。\n\n**命中后怎么做**：提醒用户\"这其实是好几个 skill，建议拆开来做\"，本工具不会自动批量生成多套 skill，每次聚焦一个。\n\n---\n\n## ② 入口识别与路由\n\n通过用户的描述，判断属于哪个入口，然后跳转对应分支：\n\n| 入口 | 用户大概这样说 | 跳转 |\n|------|--------------|------|\n| **E1 模糊想法** | \"我想做个 skill\"\"帮我自动化 XX\"\"我有个想法但不知道怎么做\" | → `references/需求共创.md` |\n| **E2 从对话提取** | \"把我们刚才做的变成 skill\"\"提取这个流程\"\"这次对话做成 skill\" | → `references/需求共创.md`（从 transcript 抽步骤/工具/纠正 → 回填四要素） |\n| **E3 现有材料** | \"我有个文档/流程图/SOP\"\"给你几对输入输出示例，照着做\"\"参考这个来做 skill\" | → `references/需求共创.md`（分析材料/示例 → 提炼四要素 → 补缺） |\n| **E4 已有草稿** | \"我写了个 SKILL.md 草稿\"\"帮我完善这个 skill\" | → `references/需求共创.md`（读懂草稿 → 补缺 → 进打磨循环） |\n| **E5 改进/调试** | \"这个 skill 不触发\"\"触发错了\"\"效果跑偏\"\"太慢太重\" | → `references/改进调试.md` |\n\n**E1/E2/E3/E4** 均路由到 `references/需求共创.md`，按各自情境执行对应段落。**E5** 路由到 `references/改进调试.md`，按诊断 playbook 执行。\n\n---\n\n## 创建流程地图（全局视图）\n\n以下是整体流程的全局视图，确保你在每个阶段都知道\"下一步去哪\"：\n\n```\n① 前置 Triage（闸门）\n   · 这要不要做成 skill？ → 一次性/普通 prompt 够/Claude 原生能干/\n                            更适合 slash command·subagent → 直说不必\n   · 有没有现成类似的？   → 扫一眼已有 skills，别重复造\n   · 范围太大？          → 提醒\"这其实是好几个 skill\"\n        │\n        ▼\n② 识别入口，跳对应分支（两类，分别走不同路）\n   ▸ 创建类 E1 模糊想法 / E2 从对话 / E3 现有材料 / E4 已有草稿\n        └─→ references/需求共创.md（四要素 / 水平信号 / 材料·输入输出例子分析）\n                 │ 四要素挖掘完\n                 ▼\n            ✦ 确认门：把四要素回述给用户、获批才开写（见 需求共创.md 第六节）──┐\n   ▸ 改进类 E5 改进/调试                                                        │\n        └─→ references/改进调试.md（诊断：不触发/行为跑偏/过欠触发/太重；不经确认门）─┤\n                                                                                 ▼\n③ 共有打磨循环（见下文\"起草 SKILL.md\"及后续章节）\n   起草 SKILL.md（含 description；顺带确认 依赖/工具/MCP 可用性）\n   → 验证【分层：轻量\"跑给你看\"默认 / 重型量化评测可选】\n   → 看结果 → 改 → 重跑 → 满意为止 → 打磨 description 触发\n        │\n        ▼\n④ 最后一公里 → references/最后一公里.md（放哪/确认装上/自测触发/打包）\n```\n\n---\n\n## ③ 共有打磨循环：起草、验证与迭代\n\n### 起草 SKILL.md\n\n根据需求共创的结果，填写以下几个核心部分：\n\n- **name**：skill 的标识符，保持简洁。\n- **description**：这是触发机制——写清楚\"什么时候用、做什么\"。把所有\"何时使用\"的信息都放在这里，不要藏在正文里。注意：Claude 有时会\"触发不足\"（明明适合用却没用），所以描述可以稍微主动一点。比如，别只写\"如何构建仪表盘\"，而是写\"构建仪表盘。当用户提到仪表盘、数据可视化、内部指标、想展示任何公司数据时，即使没有明确说'仪表盘'，也应使用本 skill。\"\n- **compatibility**：所需工具、依赖（可选，大多数 skill 不需要）。\n- **正文**：其余的 skill 说明。\n\n#### skill 的结构\n\n```\nskill-name/\n├── SKILL.md（必须）\n│   ├── YAML frontmatter（name、description 必填）\n│   └── Markdown 说明\n└── 捆绑资源（可选）\n    ├── scripts/    - 确定性/重复性任务的可执行代码\n    ├── references/ - 按需加载到上下文的文档\n    └── assets/     - 输出中用到的文件（模板、图标、字体）\n```\n\n#### 渐进加载机制\n\nSkill 有三级加载层：\n1. **元数据**（name + description）——始终在上下文中（约 100 词）\n2. **SKILL.md 正文**——skill 触发时进入上下文（理想 \u003c500 行）\n3. **捆绑资源**——按需加载（不限大小，scripts 可直接执行无需加载）\n\n关键原则：\n- SKILL.md 尽量控制在 500 行以内；接近上限时，增加一层层级并写清楚\"下一步去哪里\"的指引。\n- 在 SKILL.md 中明确引用 reference 文件，注明何时读取。\n- reference 文件超过 300 行时，加目录索引。\n\n多领域 skill 按变体组织：\n```\ncloud-deploy/\n├── SKILL.md（流程 + 选择逻辑）\n└── references/\n    ├── aws.md\n    ├── gcp.md\n    └── azure.md\n```\nClaude 只读取相关的 reference 文件。\n\n#### 内容安全\n\nSkill 不得包含恶意代码、漏洞利用代码或任何可能损害系统安全的内容。Skill 的内容不应在描述说明的范围之外给用户带来意外。不要配合制作带有误导性、旨在未授权访问或数据泄露的 skill。角色扮演类需求（如\"扮演某个角色\"）通常没问题。\n\n#### 写作风格\n\n用祈使句写指令，这样模型更容易执行。\n\n尽量说明\"为什么\"而不是堆砌 MUST/NEVER 等强制词——当今的 LLM 相当聪明，理解了背后的理由反而比死规定更灵活有效。用心揣摩用户真正想要什么，写出的 skill 要足够通用，不要只针对几个具体例子过拟合。\n\n写完初稿之后，换个视角重读一遍再改——这一步经常能发现自己没意识到的问题。\n\n**输出格式示例：**\n```markdown\n## 报告结构\n始终使用以下模板：\n# [标题]\n## 执行摘要\n## 关键发现\n## 建议\n```\n\n**示例模式——**在 skill 里放例子很有用：\n```markdown\n## commit 消息格式\n示例：\n输入：Added user authentication with JWT tokens\n输出：feat(auth): implement JWT-based authentication\n```\n\n#### 草稿自检\n\n写完初稿，换个视角重读一遍再交给验证——重点扫四件事：\n- **占位与含糊**：\"TBD\"\"按需处理\"\"适当地……\"这类没说清的要求，说清它。\n- **自相矛盾**：前后指令、description 与正文有没有打架。\n- **范围蔓延**：有没有混进需求里没确认过的功能？砍掉，或回去确认。\n- **歧义**：某条要求会不会被理解成两种意思？挑一种、写明确。\n\n发现问题就地改掉，不必反复评审。\n\n---\n\n### 分层验证：默认轻量，进阶可选\n\n验证的目的是确认 skill 的行为是否符合用户预期。根据用户的技术水平和需求，有两条路：\n\n#### 默认：轻量\"跑给你看\"\n\n起草完 skill 之后，设计 2–3 个真实用户会说出的测试提示词，和用户确认：\"这几个测试用例看起来对吗？有想加的吗？\" 然后**直接运行**，把产出展示给用户看，问\"这样对吗？\"\n\n这条路零术语、零 JSON——用户看到真实结果，给出直觉反馈，就可以进入下一轮改进。\n\n保存测试用例到 `evals/evals.json`（只保存 prompt，assertion 留给进阶阶段）：\n\n```json\n{\n  \"skill_name\": \"example-skill\",\n  \"evals\": [\n    {\n      \"id\": 1,\n      \"prompt\": \"用户实际会说的任务描述\",\n      \"expected_output\": \"期望结果的简要描述\",\n      \"files\": []\n    }\n  ]\n}\n```\n\n完整 schema（含 `assertions` 字段）见 `references/schemas.md`。\n\n#### 进阶 · 可选：重型量化评测\n\n需要严格的量化对比（benchmark/assertion，跨版本比较）时，读 `references/重型评测.md` 的「重型量化评测」一节。默认绝不把 JSON assertion、benchmark 等概念主动抛给初学用户。\n\n---\n\n### 改进 skill\n\n这是循环的核心。你已经跑完测试用例，用户已经看过结果，现在根据反馈改进 skill。\n\n**怎么思考改进方向：**\n\n- **从反馈里归纳共性**。我们在做的事情是：创建一个能被用一百万次的 skill，而现在只是在几个例子上快速迭代。如果改出来的 skill 只对这几个例子有效，就失去了意义。遇到顽固问题，与其加死规定，不如换个比喻或换种工作模式——代价低，说不定能找到更好的方案。\n\n- **保持 prompt 精简**。去掉没有实际作用的内容。读运行的完整对话记录（transcript），不要只看最终输出——如果 skill 让模型做了很多无效工作，试着删掉导致这些行为的指令，看看结果是否更好。\n\n- **解释\"为什么\"**。尽量说明你要求模型做某件事背后的理由。今天的 LLM 很聪明，给出了充分理由，它们能举一反三、灵活应对，效果往往比死规定更好。如果你发现自己在写\"ALWAYS\"或\"NEVER\"这样的全大写词，那是一个警示信号——尝试改写成解释理由的方式。\n\n- **发现跨用例的重复工作**。读各测试用例的运行记录，看看子代理有没有各自独立写了类似的辅助脚本（比如 3 个用例都写了 `create_docx.py`）。如果有，这是强信号：把这个脚本写好放进 `scripts/`，让 skill 直接调用，省去每次重新造轮子。\n\n改进后，**按你当前走的验证档重跑**（别无脑上重型）：\n1. 应用改动到 skill\n2. 重新验证：\n   - **轻量档（默认）**：重跑那 2–3 个测试提示词，把新产出摆给用户看，问\"这版好点了吗？\"——不建目录、不跑 baseline。\n   - **重型档（进阶）**：跑全部测试用例放入新的 `iteration-\u003cN+1\u003e/` 目录（含 baseline run），启动 eval viewer（`eval-viewer/generate_review.py`）并加 `--previous-workspace` 指向上一轮——细节见 `references/重型评测.md`。\n3. 等用户看完反馈\n4. 读新反馈，再改，循环\n\n直到：用户说满意、反馈全为空、或已经没有实质进展，停止循环。\n\n---\n\n### 进阶 · 可选：盲评对比\n\n需要更严格地对比两个版本的 skill 时（例如\"新版本真的更好吗\"），读 `references/重型评测.md` 的「盲评对比」一节。\n\n---\n\n## Description 触发优化\n\ndescription 字段是 Claude 决定是否调用 skill 的核心机制——它决定 skill 会不会被调用。skill 整体打磨满意后，可以主动提出优化 description 以提升触发准确率。优化时会生成触发评测查询集、让用户确认，然后用 `scripts/run_loop.py` 在后台跑优化循环，自动选出最优 description。\n\n详细流程见 `references/重型评测.md` 的「Description 触发优化」一节。\n\n---\n\n## 打包发布\n\n检查是否有 `present_files` 工具可用。有则打包 skill 并发给用户；没有则跳过。\n\n```bash\npython -m scripts.package_skill \u003cpath/to/skill-folder\u003e\n```\n\n打包后，告知用户 `.skill` 文件的路径。\n\n---\n\n## 平台差异说明\n\n### Claude.ai\n\n核心流程相同（起草 → 测试 → 审阅 → 改进 → 重复），但 Claude.ai 没有子代理，部分机制需要调整：\n\n- **跑测试用例**：不能并发，逐条执行。读 skill 的 SKILL.md，按其指令自己完成测试任务。这不如独立子代理严格（你既写了 skill 又在运行它），但作为合理性检查是有效的——人工审阅可以弥补。跳过 baseline run，只跑带 skill 的版本。\n- **展示结果**：如果无法打开浏览器，直接在对话里展示。每个用例显示 prompt 和输出；如果输出是文件（.docx、.xlsx），告知文件位置让用户下载查看；内联征求反馈：\"这样看起来怎么样？有什么想改的？\"\n- **量化评测**：跳过——没有子代理就无法做有意义的 baseline 对比。以用户的定性反馈为准。\n- **Description 优化**：需要 `claude -p`（仅 Claude Code 可用），Claude.ai 上跳过。\n- **盲评对比**：需要子代理，跳过。\n- **打包**：`scripts/package_skill.py` 只需 Python 和文件系统，在 Claude.ai 上可用。用户可下载生成的 `.skill` 文件。\n- **更新已有 skill**：保留原始 name（目录名和 frontmatter 的 `name` 字段不变）；已安装的 skill 路径可能只读，先复制到 `/tmp/skill-name/` 再编辑，打包时从副本运行。\n\n### Cowork\n\n- 有子代理，主流程（并发测试用例、baseline、评分等）完全可用。遇到严重超时问题可以改串行。\n- 没有浏览器/显示器：生成 eval viewer 时用 `--static \u003coutput_path\u003e` 输出独立 HTML 文件，给用户提供可点击的链接。\n- Cowork 环境下 Claude 有时会跳过生成 viewer 直接评估输出——请务必在让用户审阅结果之前生成 viewer（用 `eval-viewer/generate_review.py`，不要自己写 HTML）。把结果第一时间展示给用户，而不是自己先下结论。\n- Feedback：没有运行中的服务器，viewer 的\"Submit All Reviews\"会下载 `feedback.json`，从那里读取（可能需要先请求访问权限）。\n- 打包：`scripts/package_skill.py` 只需 Python 和文件系统，正常工作。\n- Description 优化（`scripts/run_loop.py`）在 Cowork 下通过 `claude -p` 子进程运行，不依赖浏览器，应该正常工作；请在 skill 整体完成、用户确认满意后再运行。\n- 更新已有 skill：同 Claude.ai 一节的指引。\n\n---\n\n## 内部文件说明\n\n`agents/*.md`、`scripts/*.py`、`references/schemas.md` 是供本 skill 内部使用的子代理指令、脚本和 schema 定义，保持英文原样；它们输出的自由文本（evidence/reasoning/笔记等）由各 agent 文件自身的语言指令控制（默认跟随用户语言）。\n\n`eval-viewer/viewer.html` 和 `assets/eval_review.html` 是**用户可见的 UI**，已中文化，不属于\"内部文件\"。同理 `scripts/` 里生成用户可见报告的部分（`generate_report.py` 等）也已中文化；脚本里给开发者看的 `print` 状态/错误同样已中文化。\n\n- `agents/grader.md` — 评估 assertion 是否通过\n- `agents/comparator.md` — 对两份输出做盲评 A/B 对比\n- `agents/analyzer.md` — 分析某版本为何胜出\n- `references/schemas.md` — evals.json、grading.json 等的 JSON schema\n- `references/需求共创.md` — 需求挖掘引擎（E1–E4 入口）\n- `references/改进调试.md` — 改进与调试 playbook（E5 入口）\n- `references/最后一公里.md` — 安装、激活、自测、打包\n- `references/重型评测.md` — 重型量化评测、盲评对比、Description 触发优化详细流程（进阶可选）\n\n---\n\n## 收尾：最后一公里\n\n当 skill 内容打磨满意、description 触发调优完成后，进入 `references/最后一公里.md`，完成安装激活、自测触发验证和打包发布。\n", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}, {"name": "xlsx", "title": "xlsx", "description": "Comprehensive spreadsheet creation, editing, and analysis with support for formulas, formatting, data analysis, and visualization. When Claude needs to work with spreadsheets (.xlsx, .xlsm, .csv, .tsv, etc) for: (1) Creating new spreadsheets with formulas and formatting, (2) Reading or analyzing data, (3) Modify existing spreadsheets while preserving formulas, (4) Data analysis and visualization in spreadsheets, or (5) Recalculating formulas", "category": "productivity", "tags": [], "status": "active", "score": 10.0, "usage_count": 0, "last_used_date": "N/A", "source_type": "custom", "path": "source/custom/productivity/xlsx", "full_content": "---\nname: xlsx\ndescription: \"Comprehensive spreadsheet creation, editing, and analysis with support for formulas, formatting, data analysis, and visualization. When Claude needs to work with spreadsheets (.xlsx, .xlsm, .csv, .tsv, etc) for: (1) Creating new spreadsheets with formulas and formatting, (2) Reading or analyzing data, (3) Modify existing spreadsheets while preserving formulas, (4) Data analysis and visualization in spreadsheets, or (5) Recalculating formulas\"\nlicense: Proprietary. LICENSE.txt has complete terms\n---\n\n# Requirements for Outputs\n\n## All Excel files\n\n### Zero Formula Errors\n- Every Excel model MUST be delivered with ZERO formula errors (#REF!, #DIV/0!, #VALUE!, #N/A, #NAME?)\n\n### Preserve Existing Templates (when updating templates)\n- Study and EXACTLY match existing format, style, and conventions when modifying files\n- Never impose standardized formatting on files with established patterns\n- Existing template conventions ALWAYS override these guidelines\n\n## Financial models\n\n### Color Coding Standards\nUnless otherwise stated by the user or existing template\n\n#### Industry-Standard Color Conventions\n- **Blue text (RGB: 0,0,255)**: Hardcoded inputs, and numbers users will change for scenarios\n- **Black text (RGB: 0,0,0)**: ALL formulas and calculations\n- **Green text (RGB: 0,128,0)**: Links pulling from other worksheets within same workbook\n- **Red text (RGB: 255,0,0)**: External links to other files\n- **Yellow background (RGB: 255,255,0)**: Key assumptions needing attention or cells that need to be updated\n\n### Number Formatting Standards\n\n#### Required Format Rules\n- **Years**: Format as text strings (e.g., \"2024\" not \"2,024\")\n- **Currency**: Use $#,##0 format; ALWAYS specify units in headers (\"Revenue ($mm)\")\n- **Zeros**: Use number formatting to make all zeros \"-\", including percentages (e.g., \"$#,##0;($#,##0);-\")\n- **Percentages**: Default to 0.0% format (one decimal)\n- **Multiples**: Format as 0.0x for valuation multiples (EV/EBITDA, P/E)\n- **Negative numbers**: Use parentheses (123) not minus -123\n\n### Formula Construction Rules\n\n#### Assumptions Placement\n- Place ALL assumptions (growth rates, margins, multiples, etc.) in separate assumption cells\n- Use cell references instead of hardcoded values in formulas\n- Example: Use =B5*(1+$B$6) instead of =B5*1.05\n\n#### Formula Error Prevention\n- Verify all cell references are correct\n- Check for off-by-one errors in ranges\n- Ensure consistent formulas across all projection periods\n- Test with edge cases (zero values, negative numbers)\n- Verify no unintended circular references\n\n#### Documentation Requirements for Hardcodes\n- Comment or in cells beside (if end of table). Format: \"Source: [System/Document], [Date], [Specific Reference], [URL if applicable]\"\n- Examples:\n  - \"Source: Company 10-K, FY2024, Page 45, Revenue Note, [SEC EDGAR URL]\"\n  - \"Source: Company 10-Q, Q2 2025, Exhibit 99.1, [SEC EDGAR URL]\"\n  - \"Source: Bloomberg Terminal, 8/15/2025, AAPL US Equity\"\n  - \"Source: FactSet, 8/20/2025, Consensus Estimates Screen\"\n\n# XLSX creation, editing, and analysis\n\n## Overview\n\nA user may ask you to create, edit, or analyze the contents of an .xlsx file. You have different tools and workflows available for different tasks.\n\n## Important Requirements\n\n**LibreOffice Required for Formula Recalculation**: You can assume LibreOffice is installed for recalculating formula values using the `recalc.py` script. The script automatically configures LibreOffice on first run\n\n## Reading and analyzing data\n\n### Data analysis with pandas\nFor data analysis, visualization, and basic operations, use **pandas** which provides powerful data manipulation capabilities:\n\n```python\nimport pandas as pd\n\n# Read Excel\ndf = pd.read_excel('file.xlsx')  # Default: first sheet\nall_sheets = pd.read_excel('file.xlsx', sheet_name=None)  # All sheets as dict\n\n# Analyze\ndf.head()      # Preview data\ndf.info()      # Column info\ndf.describe()  # Statistics\n\n# Write Excel\ndf.to_excel('output.xlsx', index=False)\n```\n\n## Excel File Workflows\n\n## CRITICAL: Use Formulas, Not Hardcoded Values\n\n**Always use Excel formulas instead of calculating values in Python and hardcoding them.** This ensures the spreadsheet remains dynamic and updateable.\n\n### ❌ WRONG - Hardcoding Calculated Values\n```python\n# Bad: Calculating in Python and hardcoding result\ntotal = df['Sales'].sum()\nsheet['B10'] = total  # Hardcodes 5000\n\n# Bad: Computing growth rate in Python\ngrowth = (df.iloc[-1]['Revenue'] - df.iloc[0]['Revenue']) / df.iloc[0]['Revenue']\nsheet['C5'] = growth  # Hardcodes 0.15\n\n# Bad: Python calculation for average\navg = sum(values) / len(values)\nsheet['D20'] = avg  # Hardcodes 42.5\n```\n\n### ✅ CORRECT - Using Excel Formulas\n```python\n# Good: Let Excel calculate the sum\nsheet['B10'] = '=SUM(B2:B9)'\n\n# Good: Growth rate as Excel formula\nsheet['C5'] = '=(C4-C2)/C2'\n\n# Good: Average using Excel function\nsheet['D20'] = '=AVERAGE(D2:D19)'\n```\n\nThis applies to ALL calculations - totals, percentages, ratios, differences, etc. The spreadsheet should be able to recalculate when source data changes.\n\n## Common Workflow\n1. **Choose tool**: pandas for data, openpyxl for formulas/formatting\n2. **Create/Load**: Create new workbook or load existing file\n3. **Modify**: Add/edit data, formulas, and formatting\n4. **Save**: Write to file\n5. **Recalculate formulas (MANDATORY IF USING FORMULAS)**: Use the recalc.py script\n   ```bash\n   python recalc.py output.xlsx\n   ```\n6. **Verify and fix any errors**: \n   - The script returns JSON with error details\n   - If `status` is `errors_found`, check `error_summary` for specific error types and locations\n   - Fix the identified errors and recalculate again\n   - Common errors to fix:\n     - `#REF!`: Invalid cell references\n     - `#DIV/0!`: Division by zero\n     - `#VALUE!`: Wrong data type in formula\n     - `#NAME?`: Unrecognized formula name\n\n### Creating new Excel files\n\n```python\n# Using openpyxl for formulas and formatting\nfrom openpyxl import Workbook\nfrom openpyxl.styles import Font, PatternFill, Alignment\n\nwb = Workbook()\nsheet = wb.active\n\n# Add data\nsheet['A1'] = 'Hello'\nsheet['B1'] = 'World'\nsheet.append(['Row', 'of', 'data'])\n\n# Add formula\nsheet['B2'] = '=SUM(A1:A10)'\n\n# Formatting\nsheet['A1'].font = Font(bold=True, color='FF0000')\nsheet['A1'].fill = PatternFill('solid', start_color='FFFF00')\nsheet['A1'].alignment = Alignment(horizontal='center')\n\n# Column width\nsheet.column_dimensions['A'].width = 20\n\nwb.save('output.xlsx')\n```\n\n### Editing existing Excel files\n\n```python\n# Using openpyxl to preserve formulas and formatting\nfrom openpyxl import load_workbook\n\n# Load existing file\nwb = load_workbook('existing.xlsx')\nsheet = wb.active  # or wb['SheetName'] for specific sheet\n\n# Working with multiple sheets\nfor sheet_name in wb.sheetnames:\n    sheet = wb[sheet_name]\n    print(f\"Sheet: {sheet_name}\")\n\n# Modify cells\nsheet['A1'] = 'New Value'\nsheet.insert_rows(2)  # Insert row at position 2\nsheet.delete_cols(3)  # Delete column 3\n\n# Add new sheet\nnew_sheet = wb.create_sheet('NewSheet')\nnew_sheet['A1'] = 'Data'\n\nwb.save('modified.xlsx')\n```\n\n## Recalculating formulas\n\nExcel files created or modified by openpyxl contain formulas as strings but not calculated values. Use the provided `recalc.py` script to recalculate formulas:\n\n```bash\npython recalc.py \u003cexcel_file\u003e [timeout_seconds]\n```\n\nExample:\n```bash\npython recalc.py output.xlsx 30\n```\n\nThe script:\n- Automatically sets up LibreOffice macro on first run\n- Recalculates all formulas in all sheets\n- Scans ALL cells for Excel errors (#REF!, #DIV/0!, etc.)\n- Returns JSON with detailed error locations and counts\n- Works on both Linux and macOS\n\n## Formula Verification Checklist\n\nQuick checks to ensure formulas work correctly:\n\n### Essential Verification\n- [ ] **Test 2-3 sample references**: Verify they pull correct values before building full model\n- [ ] **Column mapping**: Confirm Excel columns match (e.g., column 64 = BL, not BK)\n- [ ] **Row offset**: Remember Excel rows are 1-indexed (DataFrame row 5 = Excel row 6)\n\n### Common Pitfalls\n- [ ] **NaN handling**: Check for null values with `pd.notna()`\n- [ ] **Far-right columns**: FY data often in columns 50+ \n- [ ] **Multiple matches**: Search all occurrences, not just first\n- [ ] **Division by zero**: Check denominators before using `/` in formulas (#DIV/0!)\n- [ ] **Wrong references**: Verify all cell references point to intended cells (#REF!)\n- [ ] **Cross-sheet references**: Use correct format (Sheet1!A1) for linking sheets\n\n### Formula Testing Strategy\n- [ ] **Start small**: Test formulas on 2-3 cells before applying broadly\n- [ ] **Verify dependencies**: Check all cells referenced in formulas exist\n- [ ] **Test edge cases**: Include zero, negative, and very large values\n\n### Interpreting recalc.py Output\nThe script returns JSON with error details:\n```json\n{\n  \"status\": \"success\",           // or \"errors_found\"\n  \"total_errors\": 0,              // Total error count\n  \"total_formulas\": 42,           // Number of formulas in file\n  \"error_summary\": {              // Only present if errors found\n    \"#REF!\": {\n      \"count\": 2,\n      \"locations\": [\"Sheet1!B5\", \"Sheet1!C10\"]\n    }\n  }\n}\n```\n\n## Best Practices\n\n### Library Selection\n- **pandas**: Best for data analysis, bulk operations, and simple data export\n- **openpyxl**: Best for complex formatting, formulas, and Excel-specific features\n\n### Working with openpyxl\n- Cell indices are 1-based (row=1, column=1 refers to cell A1)\n- Use `data_only=True` to read calculated values: `load_workbook('file.xlsx', data_only=True)`\n- **Warning**: If opened with `data_only=True` and saved, formulas are replaced with values and permanently lost\n- For large files: Use `read_only=True` for reading or `write_only=True` for writing\n- Formulas are preserved but not evaluated - use recalc.py to update values\n\n### Working with pandas\n- Specify data types to avoid inference issues: `pd.read_excel('file.xlsx', dtype={'id': str})`\n- For large files, read specific columns: `pd.read_excel('file.xlsx', usecols=['A', 'C', 'E'])`\n- Handle dates properly: `pd.read_excel('file.xlsx', parse_dates=['date_column'])`\n\n## Code Style Guidelines\n**IMPORTANT**: When generating Python code for Excel operations:\n- Write minimal, concise Python code without unnecessary comments\n- Avoid verbose variable names and redundant operations\n- Avoid unnecessary print statements\n\n**For Excel files themselves**:\n- Add comments to cells with complex formulas or important assumptions\n- Document data sources for hardcoded values\n- Include notes for key calculations and model sections", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}, {"name": "antigravity-", "title": "Antigravity 全局规则与技能配置", "description": "本项目旨在存储和同步可供 Antigravity（AI 助手）在本地全局调用的技能（skills）以及其他全局配置文件（例如 Git 的全局忽略规则）。", "category": "engineering", "tags": ["git"], "status": "active", "score": 10.0, "usage_count": 0, "last_used_date": "N/A", "source_type": "registry", "path": "source/registry/cr20085361/antigravity-", "registry_info": {"original_url": "https://github.com/cr20085361/my_ai_skills", "repository": "cr20085361/my_ai_skills", "author": "cr20085361", "ingestion_date": "2026-05-20", "commit_hash": "42bef8a80f621cb638642eaa7b9b3bf715e6b69e"}, "full_content": "---\nname: antigravity-\ntitle: Antigravity 全局规则与技能配置\ndescription: 本项目旨在存储和同步可供 Antigravity（AI 助手）在本地全局调用的技能（skills）以及其他全局配置文件（例如 Git 的全局忽略规则）。\ncategory: engineering\ntags: [git]\nstatus: active\nscore: 10.0\n---\n\n# Antigravity 全局规则与技能配置\n\n本项目旨在存储和同步可供 Antigravity（AI 助手）在本地全局调用的技能（skills）以及其他全局配置文件（例如 Git 的全局忽略规则）。\n\n---\n\n## 🤖 给 AI 的指令 (Instructions for AI Assistant)\n\n当你（Antigravity）被要求分析此项目或者要在新电脑上加载此环境时，请**自动执行以下部署操作**：\n\n1. 确认系统当前用户的 `~/.agent/skills` 目录是否存在，如果不存在请创建它。\n2. 将本项目下的 `skills` 目录内的所有文件复制并覆盖到本机的 `~/.agent/skills` 目录，以确保全局技能生效。\n3. 将本项目下的 `.gitignore_global` 文件复制并覆盖到本机的 `~/.gitignore_global`。\n4. 运行相应的终端命令：`git config --global core.excludesfile \"~/.gitignore_global\"`，以使得这些忽略规则在所有的 Git 仓库中生效。\n5. 确认系统当前用户的 `~/.gemini` 目录是否存在，如果不存在请创建它。\n6. 将本项目下的 `GEMINI.md` 文件复制并覆盖到本机的 `~/.gemini/GEMINI.md`，以确保类似于“模型思考过程翻译为中文显示”这类的全局的 AI 对话规则生效。\n\n\u003e **提示给 AI**：你也可以直接利用本项目的内置 workflow `/deploy-config` 来自动执行上述所有步骤。", "health_status": "healthy", "health_badge": "状态极佳", "suggestion": "优秀规则：评分在安全线以上，状态极佳，无需任何改动。"}];
        
        // 简易安全 HTML 转义工具函数，防范源文件注入 XSS
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // 获取 DOM 节点
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        const scoreSort = document.getElementById('scoreSort');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        
        let currentDimension = 'functions';
        
        const COLUMN_CONFIGS = {
            functions: [
                { id: 'engineering', title: '软件工程 (Engineering)', icon: 'fa-code' },
                { id: 'design', title: '艺术设计 (Design)', icon: 'fa-palette' },
                { id: 'productivity', title: '办公效率 (Productivity)', icon: 'fa-bolt' },
                { id: 'registry', title: '外部引入 (Registry)', icon: 'fa-globe' }
            ],
            sources: [
                { id: 'custom', title: '个人自建规则 (Custom Rules)', icon: 'fa-user-gear' },
                { id: 'registry', title: '第三方引入规则 (Third-Party Rules)', icon: 'fa-cloud-arrow-down' }
            ]
        };
        
        function switchDimension(dimension) {
            if (currentDimension === dimension) return;
            currentDimension = dimension;
            
            document.getElementById('btn-func').classList.toggle('active', dimension === 'functions');
            document.getElementById('btn-src').classList.toggle('active', dimension === 'sources');
            
            renderBoard();
        }
        
        // 渲染与交互机制核心
        function renderBoard() {
            const searchKeyword = searchInput.value.toLowerCase().trim();
            const selectedStatus = statusFilter.value;
            const sortOrder = scoreSort.value;
            
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';
            
            const cols = COLUMN_CONFIGS[currentDimension];
            board.style.gridTemplateColumns = "repeat(" + cols.length + ", 1fr)";
            
            // 1. 动态生成列容器 DOM 结构
            cols.forEach(col => {
                const colSec = document.createElement('section');
                colSec.className = 'kanban-column';
                colSec.id = 'col-' + col.id;
                colSec.innerHTML = '<div class="kanban-column-header"><div class="column-title-wrapper"><i class="fa-solid ' + col.icon + ' column-icon"></i><span class="column-title">' + col.title + '</span></div><span class="column-badge" id="badge-' + col.id + '">0</span></div><div class="cards-list" id="list-' + col.id + '"></div><div class="empty-state" id="empty-' + col.id + '"><i class="fa-solid fa-box-open"></i><div>当前分类下无匹配规则</div></div>';
                board.appendChild(colSec);
            });
            
            // 2. 规则数据过滤与排序
            let filteredRules = [...rulesData];
            
            // 过滤：关键词检索
            if (searchKeyword) {
                filteredRules = filteredRules.filter(rule => {
                    const titleMatch = rule.title.toLowerCase().includes(searchKeyword);
                    const descMatch = rule.description.toLowerCase().includes(searchKeyword);
                    const idMatch = rule.name.toLowerCase().includes(searchKeyword);
                    const tagsMatch = rule.tags.some(tag => tag.toLowerCase().includes(searchKeyword));
                    return titleMatch || descMatch || idMatch || tagsMatch;
                });
            }
            
            // 过滤：状态筛选
            if (selectedStatus !== 'all') {
                filteredRules = filteredRules.filter(rule => rule.status === selectedStatus);
            }
            
            // 排序：健康分
            if (sortOrder === 'desc') {
                filteredRules.sort((a, b) => b.score - a.score);
            } else if (sortOrder === 'asc') {
                filteredRules.sort((a, b) => a.score - b.score);
            } else {
                // 默认按 ID 字母表排序
                filteredRules.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            // 3. 更新总体 KPI 大屏
            const activeRules = filteredRules.filter(r => r.status === 'active');
            document.getElementById('kpiTotal').innerText = filteredRules.length;
            document.getElementById('kpiActive').innerText = activeRules.length;
            
            let sumScore = 0;
            let criticalCount = 0;
            filteredRules.forEach(r => {
                sumScore += r.score;
                if (r.status === 'active' && r.score < 5.0) {
                    criticalCount++;
                }
            });
            const avg = filteredRules.length > 0 ? (sumScore / filteredRules.length).toFixed(2) : "0.00";
            document.getElementById('kpiAvgScore').innerText = avg;
            
            const kpiCritical = document.getElementById('kpiCritical');
            kpiCritical.innerText = criticalCount;
            kpiCritical.style.color = criticalCount > 0 ? '#ef4444' : '#ffffff';
            
            // 4. 将卡片分配入动态创建的列中
            let colCounts = {};
            cols.forEach(col => colCounts[col.id] = 0);
            
            filteredRules.forEach(rule => {
                let targetColId = '';
                if (currentDimension === 'functions') {
                    targetColId = rule.source_type === 'registry' ? 'registry' : rule.category;
                } else {
                    targetColId = rule.source_type; // 'custom' or 'registry'
                }
                
                const colList = document.getElementById('list-' + targetColId);
